# Uncomment the following lines to enable the Corne RGB Underglow
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y

# Enable the nice!view display.
# NOTE: the nice_view shield does NOT auto-enable this — it must be set here,
# or the screens stay dark on any ZMK version (default status screen = custom
# nice!view widget).
CONFIG_ZMK_DISPLAY=y

# Change board name
CONFIG_ZMK_KEYBOARD_NAME="Corne"

# set deep sleep
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=300000
